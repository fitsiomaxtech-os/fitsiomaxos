name: Deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.PORT }}
          timeout: 120s
          command_timeout: 20m
          script: |
            set -e

            APP_DIR="/root/projects/fitsiomaxos"
            cd "$APP_DIR"

            git fetch origin main
            git reset --hard origin/main

            cd "$APP_DIR/frontend"
            npm ci --legacy-peer-deps
            npm run build

            WEB_ROOT=""
            if command -v nginx >/dev/null 2>&1; then
              WEB_ROOT="$(nginx -T 2>/dev/null | awk '$1 == "root" { gsub(";", "", $2); print $2 }' | grep -E '/frontend/build|/var/www|/usr/share/nginx/html' | head -n 1 || true)"
            fi
            if [ -n "$WEB_ROOT" ] && [ "$WEB_ROOT" != "$APP_DIR/frontend/build" ]; then
              echo "Copying frontend build to Nginx root: $WEB_ROOT"
              mkdir -p "$WEB_ROOT"
              cp -a "$APP_DIR/frontend/build/." "$WEB_ROOT/"
            else
              echo "Nginx root already points to repo build folder or was not detected."
            fi

            cd "$APP_DIR/backend"
            if [ -x ".venv/bin/pip" ]; then
              .venv/bin/pip install -r requirements.txt
            elif [ -x "venv/bin/pip" ]; then
              venv/bin/pip install -r requirements.txt
            else
              python3 -m pip install -r requirements.txt
            fi

            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart backend || true
              pm2 restart frontend || true
              pm2 restart all || true
              pm2 save || true
            fi

            if command -v nginx >/dev/null 2>&1; then
              nginx -t
              systemctl reload nginx || true
            fi
